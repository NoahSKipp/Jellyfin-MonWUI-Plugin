name: Close Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 7
          days-before-close: 7

          remove-stale-when-updated: true

          stale-issue-message: >
            This issue has been marked as stale because there has been no activity for 7 days.
            It will be automatically closed in 7 days if no further activity occurs.

          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If the problem still exists, please feel free to reopen the issue or create a new one with updated information.

          stale-pr-message: >
            This pull request has been marked as stale because there has been no activity for 7 days.
            It will be automatically closed in 7 days if no further activity occurs.

          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
