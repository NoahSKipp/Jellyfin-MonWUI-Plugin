name: Close Issues Without Owner Response

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  contents: read

jobs:
  close-inactive-owner-response:
    runs-on: ubuntu-latest

    steps:
      - name: Close issues without owner response
        uses: actions/github-script@v8
        with:
          script: |
            const DAYS_BEFORE_CLOSE = 14;
            const now = new Date();
            const cutoff = new Date(now.getTime() - DAYS_BEFORE_CLOSE * 24 * 60 * 60 * 1000);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const ownerOrMaintainerComments = comments.filter(comment =>
                ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(comment.author_association)
              );

              const lastOwnerResponseDate = ownerOrMaintainerComments.length > 0
                ? new Date(ownerOrMaintainerComments[ownerOrMaintainerComments.length - 1].created_at)
                : new Date(issue.created_at);

              if (lastOwnerResponseDate <= cutoff) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'This issue has been automatically closed because there has been no response from the repository owner or maintainer for 14 days.'
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
